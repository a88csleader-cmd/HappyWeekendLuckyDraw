<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ฝากปุ๊บ ลุ้นโชคปังทุกเสาร์-อาทิตย์!</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div id="prize-game-container">
    <h2>🎁 ฝากปุ๊บ ลุ้นโชคปังทุกเสาร์-อาทิตย์!</h2>
    <p>หมุนวงล้อเพื่อชิงรางวัลสูงสุด 5,000 บาท!</p>

    <input type="text" id="pg-username" placeholder="ใส่ยูสเซอร์เนมของคุณ">
    <button id="pg-start-btn">เริ่มสุ่มรางวัล</button>

    <div id="slot-machine">
      <div class="slot">8</div>
      <div class="slot">8</div>
      <div class="slot">8</div>
      <div class="slot">8</div>
    </div>

    <div id="pg-prize-display">กดเริ่มเพื่อลุ้นรางวัล</div>

    <div id="recent-winners">
      <h3>🏆 ผู้โชคดีล่าสุด</h3>
      <ul id="winner-list"></ul>
    </div>

    <canvas id="confetti"></canvas>
  </div>

  <script src="script.js"></script>
</body>
</html>
